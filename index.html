<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志工定位打卡驗證</title>
    <style>
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; text-align: center; padding: 40px 20px; background-color: #f4f7f9; color: #333; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        h2 { color: #1a73e8; margin-top: 0; }
        #status { font-size: 16px; color: #5f6368; margin: 25px 0; min-height: 60px; line-height: 1.6; }
        .btn { width: 100%; padding: 16px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer; text-decoration: none; font-weight: bold; transition: 0.3s; display: block; margin-bottom: 10px; }
        #start-btn { background: #1a73e8; color: white; }
        #go-btn { background: #34a853; color: white; display: none; box-shadow: 0 4px 12px rgba(52, 168, 83, 0.4); }
        .hint-box { font-size: 13px; color: #70757a; margin-top: 25px; text-align: left; background: #fff3cd; padding: 15px; border-radius: 10px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📍 志工到班驗證</h2>
        
        <div id="status">系統準備就緒...<br>請開啟手機 GPS 與 Wi-Fi 提高精準度</div>
        
        <button id="start-btn" class="btn" onclick="startLocation()">🚀 開始地點定位驗證</button>
        <a id="go-btn" class="btn" href="javascript:void(0)" onclick="goToForm()">✅ 驗證成功！進入表單</a>
        
        <div class="hint-box">
            <b>⚠️ 系統打卡提示：</b><br>
            1. 本系統僅驗證您是否已抵達園區。<br>
            2. 連班志工可於前一班下班後，直接重新掃描進行下一班打卡。
        </div>
    </div>

    <script>
        // ======= 參數設定區 =======
        const officeLat = 25.02014; 
        const officeLng = 121.52533;
        const targetUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfPvRgEFptn42lJT1POncBxngjaDx4AKrJlC9GRGocALmOR7Q/viewform"; 
        const maxDistance = 0.8; // 800公尺
        // =========================

        const statusLabel = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const goBtn = document.getElementById('go-btn');

        function startLocation() {
            startBtn.innerText = "正在精確偵測位置...";
            startBtn.disabled = true;
            startBtn.style.opacity = "0.6";
            statusLabel.innerHTML = "⏳ 正在與衛星及網路基地台連線...";

            if (!navigator.geolocation) {
                statusLabel.innerText = "抱歉，您的裝置不支援定位功能。";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const dist = getDistance(pos.coords.latitude, pos.coords.longitude, officeLat, officeLng);
                    const m = (dist * 1000).toFixed(0);
                    
                    if (dist <= maxDistance) {
                        statusLabel.innerHTML = "<b style='color:#34a853; font-size:18px;'>📍 位置驗證通過！</b><br>您目前距離園區約 " + m + " 公尺";
                        startBtn.style.display = "none";
                        goBtn.style.display = "block";
                    } else {
                        statusLabel.innerHTML = "<b style='color:#d93025;'>超出打卡範圍</b><br>目前偵測距離約 " + m + " 公尺";
                        resetStartBtn("重新偵測位置");
                    }
                },
                (err) => {
                    statusLabel.innerHTML = "<b style='color:#f9ab00'>定位失敗</b><br>請確認已授權位置權限。";
                    resetStartBtn("再次嘗試");
                },
                { enableHighAccuracy: false, timeout: 12000 }
            );
        }

        function goToForm() {
            // 已移除手機紀錄與冷卻時間鎖
            window.location.href = targetUrl;
        }

        function resetStartBtn(text) {
            startBtn.innerText = text;
            startBtn.disabled = false;
            startBtn.style.opacity = "1";
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
